<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PSD Layer PNG Exporter</title>
    <script type="module" crossorigin src="/assets/index-DZdfEgxk.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-BmK8aWCZ.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <p class="eyebrow">LOCAL PSD UTILITY</p>
        <h1>PSDレイヤーを、<em>透過PNG</em>へ。</h1>
        <p class="intro">PSDを読み込み、レイヤーごとにPNGとしてローカルへ保存します。ファイルは外部へ送信されません。</p>
      </section>

      <section class="panel" aria-label="PSD書き出し設定">
        <label class="drop-zone" id="drop-zone" for="psd-file">
          <input id="psd-file" type="file" accept=".psd,image/vnd.adobe.photoshop" />
          <span class="drop-icon">↓</span>
          <span class="drop-title">PSDファイルを選択</span>
          <span class="drop-note">またはここへドラッグ＆ドロップ</span>
        </label>
        <p id="file-name" class="file-name" aria-live="polite">ファイルが選択されていません</p>
        <button id="export-button" class="export-button" type="button" disabled>出力先を選んで書き出す</button>
        <p class="hint">出力先に <code>output/[PSD名]_yyyymmdd_hhmmss</code> フォルダを作成します。</p>
      </section>

      <section class="status-wrap" aria-live="polite">
        <p id="status" class="status">PSDファイルを選択してください。</p>
        <ol id="results" class="results" hidden></ol>
      </section>
    </main>
  </body>
</html>
